<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Boletim Mensal - Meu amigo cão</title>
</head>
<body>

  <h1>Meu amigo cão - Petshop</h1>

  <h2>Boletim mensal</h2>

  <h3>Assine já!</h3>

  <p>Fazendo sua assinatura você receberá mensalmente informações sobre nossos produtos, serviços, eventos e descontos.</p>

  <form>
    <p>
      <label for="nome">Nome:</label><br>
      <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
    </p>
    <p>
      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" placeholder="Digite seu endereço de email">
    </p>
    <p>
      <input type="submit" value="Enviar">
    </p>
  </form>

</body>
</html>
